<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Mechanic AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="auto-mechanic">

  <!-- возврат -->
  <div style="padding:20px;">
    <a href="index.html" style="color:#ff7a18;">← Back to AI Navigator</a>
  </div>
<div id="usageInfo"></div>

  <!-- MAIN -->
  <div class="auto-mechanic-inner">

    <h1>🚗 Auto Mechanic AI</h1>

    <input id="car" placeholder="Car brand (e.g. BMW)" />
    <input id="year" placeholder="Year" />
    <input id="vin" placeholder="VIN (optional)" />

    <textarea id="problem" placeholder="Describe the problem..."></textarea>

    <button id="analyzeBtn" onclick="sendProblem()">Analyze Problem</button>

    <div id="usageInfo" style="margin-top:10px; color:#ccc;"></div>

    <div id="result"></div>

  </div>

    <!-- 💰 PRICING BLOCK -->
  <div class="pricing-card">
    <h2>🚗 Auto Mechanic Premium</h2>

    <p>Full AI diagnostics & repair guidance.</p>

    <div class="price">$10</div>

    <p style="color:#b6b6b6; margin-top:5px;">
      50 AI diagnostics (attempts)
    </p>

    <ul>
      <li>✔ Full AI diagnosis</li>
      <li>✔ Repair instructions</li>
      <li>✔ VIN analysis</li>
      <li>✔ Priority responses</li>
    </ul>

    <button onclick="goPremium()">Get Premium</button>
  </div>


</div>

<script src="auto-mechanic.js"></script>
</body>
</html>
